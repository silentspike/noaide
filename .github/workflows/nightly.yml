name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"  # 2:00 UTC daily
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  check-manifests:
    name: Check Project Manifests
    runs-on: ubuntu-latest
    outputs:
      has-cargo: ${{ steps.check.outputs.has-cargo }}
      has-frontend: ${{ steps.check.outputs.has-frontend }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for project manifests
        id: check
        run: |
          if [ -f "Cargo.toml" ]; then echo "has-cargo=true" >> "$GITHUB_OUTPUT"; else echo "has-cargo=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f "frontend/package.json" ]; then echo "has-frontend=true" >> "$GITHUB_OUTPUT"; else echo "has-frontend=false" >> "$GITHUB_OUTPUT"; fi

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: check-manifests
    if: needs.check-manifests.outputs.has-cargo == 'true' && needs.check-manifests.outputs.has-frontend == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM modules
        run: |
          for mod in jsonl-parser markdown compress; do
            wasm-pack build wasm/$mod --target web --out-dir ../../frontend/src/wasm/$mod
          done

      - name: Build backend server
        run: cargo build --release --bin noaide-server

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install chromium --with-deps

      - name: Build frontend
        run: cd frontend && pnpm run build

      - name: Seed E2E fixtures
        run: |
          mkdir -p /tmp/noaide-nightly/data
          cp -r frontend/e2e/fixtures/claude-home /tmp/noaide-nightly/claude-home
          cp -r frontend/e2e/fixtures/plans /tmp/noaide-nightly/plans

      - name: Start backend server
        run: |
          NOAIDE_DB_PATH=/tmp/noaide-nightly/data/ide.db \
          NOAIDE_PLAN_DIR=/tmp/noaide-nightly/plans \
          NOAIDE_WATCH_PATHS=/tmp/noaide-nightly/claude-home \
          NOAIDE_LOG_LEVEL=info \
          nohup ./target/release/noaide-server > /tmp/noaide-nightly/server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"; break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/health || (echo "Backend not responding:"; cat /tmp/noaide-nightly/server.log; exit 1)
          for i in $(seq 1 15); do
            count=$(curl -sf http://localhost:8080/api/sessions | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
            if [ "$count" -ge 3 ]; then
              echo "Discovery indexed $count sessions after ${i}s"; break
            fi
            sleep 1
          done

      - name: Run E2E tests
        run: cd frontend && pnpm run e2e

      - name: Backend log on failure
        if: failure()
        run: |
          echo "=== Backend log ==="
          cat /tmp/noaide-nightly/server.log || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-playwright-report-${{ github.run_number }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: check-manifests
    if: needs.check-manifests.outputs.has-cargo == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: cargo bench -p noaide-server -- --output-format bencher | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            benchmark-results.txt
            target/criterion/**/report/index.html
            target/criterion/**/base/estimates.json
          if-no-files-found: warn

  extended-security:
    name: Extended Security Scan
    runs-on: ubuntu-latest
    needs: check-manifests
    if: needs.check-manifests.outputs.has-cargo == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Full dependency audit
        run: cargo audit --json > cargo-audit-full.json

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies for audit
        run: cd frontend && pnpm install --frozen-lockfile

      - name: pnpm audit (full report — never fails)
        run: cd frontend && pnpm audit --json > ../pnpm-audit-full.json || true

      - name: pnpm audit (high+ severity — fails the job)
        run: cd frontend && pnpm audit --audit-level=high

      - name: Gitleaks full scan
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          ./gitleaks detect --source=. --verbose --redact --log-opts="--all"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            cargo-audit-full.json
            pnpm-audit-full.json
